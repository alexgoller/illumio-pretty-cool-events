{% from "_macros.html" import event_full, event_badge, event_creator %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PCE Event: {{ event_type }}</title>
  <style>
    body { margin:0; padding:0; background:#f4f5f7; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; font-size:14px; color:#212529; }
    .wrapper { max-width:640px; margin:0 auto; padding:20px; }
    a { color:#0d6efd; }
    code { background:#f1f3f5; padding:2px 6px; border-radius:3px; font-size:12px; }
    pre { white-space:pre-wrap; word-break:break-all; }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- Logo / branding -->
    <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:16px;">
      <tr>
        <td>
          <img src="https://www.illumio.com/sites/default/files/styles/thumbnail/public/2020-04/Illumio-Logo-Color.png"
               alt="Illumio" style="height:32px;">
        </td>
        <td style="text-align:right;color:#6c757d;font-size:12px;">
          Pretty Cool Events
        </td>
      </tr>
    </table>

    <!-- Full event rendering using the macros -->
    {{ event_full(event) }}

    <!-- PCE link -->
    <table width="100%" cellpadding="0" cellspacing="0" style="margin-top:16px;">
      <tr>
        <td style="text-align:center;padding:12px;">
          <a href="https://{{ pce_fqdn }}:8443/#{{ href | replace('/orgs/1', '') }}"
             style="display:inline-block;background:#0d6efd;color:#fff;padding:10px 24px;border-radius:6px;text-decoration:none;font-weight:bold;">
            View on PCE
          </a>
        </td>
      </tr>
    </table>

    <!-- Footer -->
    <table width="100%" cellpadding="0" cellspacing="0" style="margin-top:24px;border-top:1px solid #dee2e6;">
      <tr>
        <td style="padding:12px 0;text-align:center;color:#6c757d;font-size:11px;">
          PCE: {{ pce_fqdn }} &middot; Org: {{ pce_org | default(1) }} &middot; Event: {{ href }}
        </td>
      </tr>
    </table>

  </div>
</body>
</html>
